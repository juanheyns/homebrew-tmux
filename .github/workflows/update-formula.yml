name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          TAG="${{ github.event.client_payload.tag }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          URL="${{ github.event.client_payload.tarball_url }}"

          echo "Updating $FORMULA to $VERSION (sha256: $SHA256)"

          FORMULA_FILE="Formula/${FORMULA}.rb"

          # Update url
          sed -i "s|url \".*\"|url \"${URL}\"|" "$FORMULA_FILE"
          # Update sha256
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA_FILE"

          cat "$FORMULA_FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          git add "Formula/${FORMULA}.rb"
          git commit -m "Update ${FORMULA} to ${VERSION}"
          git push
